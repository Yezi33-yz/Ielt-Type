<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join Us - IELTS Typer 成员登记</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style type="text/tailwindcss">
        :root {
            --primary-color: #568203;
            --primary-pale: #f4f7ed;
            --sketch-ink: #1a1a1a;
        }
        @layer utilities {
            .sketch-border {
                border: 2px solid var(--sketch-ink);
                border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            }
            .paper-texture {
                background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            }
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#568203",
                        "primary-pale": "#f4f7ed",
                        "sketch-ink": "#1a1a1a"
                    },
                    fontFamily: { "display": ["Lexend"] }
                },
            },
        }
    </script>
</head>
<body class="bg-white font-display text-sketch-ink min-h-screen paper-texture flex items-center justify-center p-6">

<div class="w-full max-w-md my-12">
    <div class="bg-white p-10 sketch-border shadow-xl relative">

        <div class="absolute -top-10 left-1/2 -translate-x-1/2 text-4xl">
            🐾
        </div>

        <header class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-tight mb-2">登记新成员</h2>
            <p class="text-[10px] opacity-40 uppercase tracking-[0.2em] font-bold">IELTS Typer Membership</p>
        </header>

        <div class="space-y-4">
            <div class="group">
                <div class="sketch-border bg-white p-2.5 flex items-center gap-3 focus-within:border-primary focus-within:bg-primary-pale transition-all">
                    <span class="material-icons text-xl opacity-20 group-focus-within:text-primary">face</span>
                    <input type="text" id="user" placeholder="起个猫名 (用户名)"
                           class="w-full bg-transparent border-none focus:ring-0 text-base outline-none placeholder:opacity-20">
                </div>
            </div>

            <div class="group">
                <div class="sketch-border bg-white p-2.5 flex items-center gap-3 focus-within:border-primary focus-within:bg-primary-pale transition-all">
                    <span class="material-icons text-xl opacity-20 group-focus-within:text-primary">mail_outline</span>
                    <input type="email" id="email" placeholder="邮箱地址"
                           class="w-full bg-transparent border-none focus:ring-0 text-base outline-none placeholder:opacity-20">
                </div>
            </div>

            <div class="group">
                <div class="sketch-border bg-white p-2.5 flex items-center gap-3 focus-within:border-primary focus-within:bg-primary-pale transition-all">
                    <span class="material-icons text-xl opacity-20 group-focus-within:text-primary">smartphone</span>
                    <input type="tel" id="phone" placeholder="手机号 (可选)"
                           class="w-full bg-transparent border-none focus:ring-0 text-base outline-none placeholder:opacity-20">
                </div>
            </div>

            <div class="group">
                <div class="sketch-border bg-white p-2.5 flex items-center gap-3 focus-within:border-primary focus-within:bg-primary-pale transition-all">
                    <span class="material-icons text-xl opacity-20 group-focus-within:text-primary">vpn_key</span>
                    <input type="password" id="pw" placeholder="设置暗号 (密码)"
                           class="w-full bg-transparent border-none focus:ring-0 text-base outline-none placeholder:opacity-20">
                </div>
            </div>

            <button onclick="doRegister()"
                    class="w-full mt-4 py-4 bg-primary text-white rounded-xl font-bold text-lg hover:scale-[1.02] transition-transform shadow-lg active:scale-95">
                开启干饭之旅
            </button>
        </div>

        <div class="mt-8 pt-8 border-t border-sketch-ink/10 border-dashed text-center">
            <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-4">快捷登记</p>
            <div class="flex justify-center gap-6">
                <button class="w-10 h-10 rounded-full border-2 border-sketch-ink flex items-center justify-center hover:bg-primary-pale transition-colors group">
                    <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" class="w-5 h-5 grayscale opacity-40 group-hover:opacity-100 transition-all" alt="WeChat">
                </button>
                <button class="w-10 h-10 rounded-full border-2 border-sketch-ink flex items-center justify-center hover:bg-primary-pale transition-colors group">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111621.png" class="w-5 h-5 grayscale opacity-40 group-hover:opacity-100 transition-all" alt="QQ">
                </button>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="login.html" class="text-xs font-bold text-primary hover:underline underline-offset-4 tracking-wider">
                已有猫籍？直接登录
            </a>
        </div>
    </div>

    <p class="text-center mt-8 text-[9px] font-bold opacity-20 uppercase tracking-[0.4em]">
        Join the IELTS Typer community
    </p>
</div>

<script>
    async function doRegister() {
        const username = document.getElementById('user').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('pw').value;

        if(!username || !password || !email) {
            alert("喵？关键信息还没填全呢！");
            return;
        }

        const data = { username, email, phone, password };

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                alert("注册成功！小猫在主页等你。");
                window.location.href = "login.html";
            } else {
                alert("喵呜，登记失败，可能是名字被占用了？");
            }
        } catch (e) {
            console.error("注册请求失败:", e);
            alert("网络连接失败，请检查后端！");
        }
    }
</script>

</body>
</html>
