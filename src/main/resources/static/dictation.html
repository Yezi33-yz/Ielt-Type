<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>听写挑战 - IELTS Typer</title>
    <script src="js/auth.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

    <style type="text/tailwindcss">
        :root {
            --primary-color: #568203;
            --primary-pale: #f4f7ed;
            --sketch-ink: #1a1a1a;
        }
        @layer utilities {
            .sketch-border {
                border: 2px solid var(--sketch-ink);
                border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            }
            .sketch-line {
                height: 4px;
                background: var(--sketch-ink);
                border-radius: 50% 20% 40% 10%;
            }
            .paper-texture {
                background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            }
        }
    </style>

    <style>
        .group:hover .group-hover\:block { display: block; }

        /* 答对/答错动画 */
        @keyframes flashGreen {
            0%   { background: #c5e8a0; }
            100% { background: white; }
        }
        @keyframes flashRed {
            0%   { background: #fecaca; }
            100% { background: white; }
        }
        .flash-correct { animation: flashGreen 0.4s ease-out; }
        .flash-wrong   { animation: flashRed   0.4s ease-out; }

        /* 倒计时数字动画 */
        @keyframes popIn {
            0%   { transform: scale(1.6); opacity: 0; }
            60%  { transform: scale(0.9); }
            100% { transform: scale(1);   opacity: 1; }
        }
        .pop-in { animation: popIn 0.35s cubic-bezier(.36,.07,.19,.97); }

        /* 计时圆环 */
        #timerRing { transition: stroke-dashoffset 1s linear, stroke 0.3s; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#568203",
                        "primary-pale": "#f4f7ed",
                        "sketch-ink": "#1a1a1a",
                        "error-red": "#F4520D"
                    },
                    fontFamily: { "display": ["Lexend", "sans-serif"] }
                }
            }
        }
    </script>
</head>

<body class="bg-white font-display text-sketch-ink min-h-screen paper-texture flex flex-col">

<!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
<header class="w-full border-b-2 border-sketch-ink/20 border-dashed sticky top-0 bg-white/90 backdrop-blur z-50">
    <div class="relative flex justify-between items-center py-5 px-8 max-w-[1920px] mx-auto">

        <div class="flex items-center gap-2 cursor-pointer hover:-translate-y-1 transition-transform z-20" onclick="location.href='home.html'">
            <span class="material-icons text-primary text-3xl">pets</span>
            <span class="font-bold text-2xl tracking-tight">IELTS Typer</span>
        </div>

        <nav class="hidden xl:flex absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl px-12 justify-between items-center z-10 pointer-events-none">
            <a href="home.html" class="w-32 text-center py-2.5 bg-white font-bold tracking-widest sketch-border shadow-[4px_4px_0px_rgba(26,26,26,0.1)] hover:bg-primary-pale transition-all cursor-pointer pointer-events-auto">主页</a>
            <a href="review.html" class="w-32 text-center py-2.5 bg-white font-bold tracking-widest sketch-border shadow-[4px_4px_0px_rgba(26,26,26,0.1)] hover:bg-primary-pale transition-all cursor-pointer pointer-events-auto">错词本</a>
            <a href="stats.html" class="w-32 text-center py-2.5 bg-white font-bold tracking-widest sketch-border shadow-[4px_4px_0px_rgba(26,26,26,0.1)] hover:bg-primary-pale transition-all cursor-pointer pointer-events-auto">学习统计</a>
            <a href="dictation.html" class="w-32 text-center py-2.5 bg-yellow-400 font-bold tracking-widest sketch-border shadow-[4px_4px_0px_rgba(26,26,26,0.1)] hover:bg-yellow-300 transition-all cursor-pointer pointer-events-auto">听写模式</a>
        </nav>

        <div class="relative group z-20">
            <div class="flex items-center gap-3 px-4 py-2 border-2 border-sketch-ink bg-white shadow-[4px_4px_0px_rgba(26,26,26,0.1)] cursor-pointer hover:bg-gray-50 transition-colors sketch-border">
                <span class="text-sm font-bold" id="userNameDisplay">加载中...</span>
                <div class="w-8 h-8 bg-primary flex items-center justify-center text-white text-sm font-bold border-2 border-sketch-ink rounded-full" id="userAvatar">U</div>
            </div>
            <div class="absolute top-full left-0 right-0 h-4 hidden group-hover:block"></div>
            <div class="absolute right-0 top-full mt-3 w-56 bg-white sketch-border hidden group-hover:block z-50 shadow-xl">
                <div class="p-2 space-y-1">
                    <div class="px-4 py-3 cursor-pointer hover:bg-primary-pale rounded-lg flex items-center justify-between transition-colors" onclick="location.href='vip.html'">
                        <span id="vipLabel" class="font-bold text-yellow-600 text-sm">💎 普通用户</span>
                        <span class="text-xs opacity-50 font-bold">特权 ></span>
                    </div>
                    <div class="h-[2px] w-full sketch-line opacity-10 my-2"></div>
                    <div class="px-4 py-2 text-sm font-medium cursor-pointer hover:bg-primary-pale rounded-lg transition-colors flex items-center gap-2" onclick="location.href='avatar.html'">
                        <span class="material-icons text-sm opacity-60">face</span> 更换头像
                    </div>
                    <div class="px-4 py-2 text-sm font-medium cursor-pointer hover:bg-primary-pale rounded-lg transition-colors flex items-center gap-2" onclick="location.href='themes.html'">
                        <span class="material-icons text-sm opacity-60">palette</span> 主题设置
                    </div>
                    <div class="h-[2px] w-full sketch-line opacity-10 my-2"></div>
                    <div class="px-4 py-2 text-sm font-bold text-error-red cursor-pointer hover:bg-error-red hover:text-white sketch-border transition-colors flex items-center gap-2 mt-2" onclick="logout()">
                        <span class="material-icons text-sm">logout</span> 退出登录
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
<main class="flex-1 flex items-center justify-center px-6 py-8">

    <!-- ── 开始界面 ── -->
    <div id="screen-intro" class="w-full max-w-lg text-center hidden">
        <div class="text-6xl mb-6">🎧</div>
        <h1 class="text-4xl font-bold mb-3">听写挑战</h1>
        <p class="opacity-50 mb-10 font-medium">系统朗读单词，你来键入 —— 拼对了才算会！</p>

        <!-- 数量滑块 -->
        <div class="bg-white sketch-border p-6 mb-6 text-left">
            <div class="flex justify-between items-center mb-3">
                <span class="font-bold text-sm">本次听写数量</span>
                <span class="text-primary font-bold text-xl" id="wordCountLabel">20 个</span>
            </div>
            <input type="range" id="wordCountSlider" min="5" max="50" step="5" value="20"
                   class="w-full accent-primary"
                   oninput="document.getElementById('wordCountLabel').innerText = this.value + ' 个'">
        </div>

        <!-- 难度选择 -->
        <div class="bg-white sketch-border p-6 mb-2">
            <div class="grid grid-cols-3 gap-3">
                <button onclick="selectDifficulty('easy', this)" id="diff-easy"
                        class="diff-btn py-4 px-2 sketch-border bg-primary text-white font-bold transition-all">简单</button>
                <button onclick="selectDifficulty('hard', this)" id="diff-hard"
                        class="diff-btn py-4 px-2 sketch-border bg-white font-bold transition-all">困难</button>
                <button onclick="selectDifficulty('hell', this)" id="diff-hell"
                        class="diff-btn py-4 px-2 sketch-border bg-white font-bold transition-all">地狱</button>
            </div>
            <!-- 难度说明 -->
            <p id="diffHint" class="text-xs opacity-40 mt-4 font-medium text-center">⏱ 简单：每题 20 秒</p>
        </div>

        <button onclick="startDictation()" class="w-full py-4 bg-primary text-white font-bold text-lg sketch-border mt-6 hover:-translate-y-1 transition-transform">开始听写</button>
    </div>

    <!-- ── 3-2-1 倒计时界面 ── -->
    <div id="screen-countdown" class="hidden text-center">
        <div class="text-[120px] font-bold text-primary leading-none" id="countdownNum">3</div>
        <p class="opacity-40 font-bold mt-4">准备好了吗？</p>
    </div>

    <!-- ── 听写界面 ── -->
    <div id="screen-dictating" class="hidden w-full max-w-lg">
        <div class="flex justify-between items-center mb-8">
            <span class="text-sm font-bold opacity-40" id="dictProgress">1 / 20</span>
            <span class="text-sm font-bold opacity-40" id="dictDiffLabel">简单模式</span>
        </div>

        <!-- 环形计时器 -->
        <div class="flex flex-col items-center mb-10">
            <div class="relative w-32 h-32">
                <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="44" fill="none" stroke="#e5e7eb" stroke-width="8"/>
                    <circle id="timerRing" cx="50" cy="50" r="44" fill="none"
                            stroke="#568203" stroke-width="8" stroke-linecap="round"
                            stroke-dasharray="276.46" stroke-dashoffset="0"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-3xl font-bold text-primary" id="timerNum">20</span>
                    <span class="text-xs opacity-40 font-bold">秒</span>
                </div>
            </div>
        </div>

        <!-- 输入框 -->
        <div id="dictInputBox" class="sketch-border bg-white p-4 mb-3 transition-colors">
            <input id="dictInput" type="text" autocomplete="off" autofocus
                   placeholder="键入单词后按 Enter..."
                   class="w-full bg-transparent border-none text-3xl text-center font-bold outline-none placeholder:text-gray-300"/>
        </div>

        <!-- 上一题反馈提示 -->
        <div id="lastFeedback" class="text-center text-sm font-bold opacity-0 h-6 transition-opacity duration-300"></div>

        <!-- 跳过按钮 -->
        <div class="text-center mt-6">
            <button onclick="skipWord()" class="text-xs opacity-30 hover:opacity-60 transition-opacity font-bold underline">跳过这个词</button>
        </div>
    </div>

    <!-- ── 结果界面 ── -->
    <div id="screen-result" class="hidden w-full max-w-lg text-center">
        <div class="text-5xl mb-4" id="resultEmoji">🎉</div>
        <h2 class="text-3xl font-bold mb-8">本轮完成！</h2>
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white sketch-border p-4">
                <div class="text-2xl font-bold text-primary" id="resultCorrect">0</div>
                <div class="text-xs opacity-40 mt-1">答对</div>
            </div>
            <div class="bg-white sketch-border p-4">
                <div class="text-2xl font-bold text-error-red" id="resultWrong">0</div>
                <div class="text-xs opacity-40 mt-1">答错 / 超时</div>
            </div>
            <div class="bg-white sketch-border p-4">
                <div class="text-2xl font-bold" id="resultAccuracy">0%</div>
                <div class="text-xs opacity-40 mt-1">正确率</div>
            </div>
        </div>

        <!-- 错词列表 -->
        <div id="wrongListSection" class="hidden bg-white sketch-border p-6 mb-6 text-left">
            <h3 class="font-bold text-sm mb-3 opacity-60 uppercase tracking-widest">本次错词</h3>
            <div id="wrongList" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="flex gap-3">
            <button onclick="restartDictation()" class="flex-1 py-4 bg-primary text-white font-bold sketch-border hover:-translate-y-1 transition-transform">再来一轮</button>
            <button onclick="location.href='home.html'" class="flex-1 py-3 sketch-border font-bold hover:bg-primary-pale transition-colors">返回主页</button>
        </div>
    </div>

    <!-- ── VIP 提示界面 ── -->
    <div id="screen-vip" class="hidden w-full max-w-md text-center">
        <div class="text-6xl mb-6">💎</div>
        <h2 class="text-3xl font-bold mb-4">听写是 VIP 专属功能</h2>
        <p class="opacity-50 mb-8 font-medium">升级 VIP 解锁听写挑战、错词强化等专属功能</p>
        <button onclick="location.href='vip.html'" class="w-full py-4 bg-yellow-400 font-bold sketch-border hover:-translate-y-1 transition-transform">立即升级 VIP →</button>
        <button onclick="location.href='home.html'" class="w-full py-3 mt-3 opacity-40 font-bold hover:opacity-70 transition-opacity">先不了</button>
    </div>

</main>

<!-- ═══════════════════════════ SCRIPT ═══════════════════════════ -->
<script>
    const currentUser = sessionStorage.getItem('loginUser');

    // ── 难度配置 ──────────────────────────────────────────────────
    const DIFFICULTY = {
        easy: { seconds: 20, label: '简单模式', hint: '⏱ 简单：每题 20 秒' },
        hard: { seconds: 15, label: '困难模式', hint: '⏱ 困难：每题 15 秒' },
        hell: { seconds: 5,  label: '地狱模式', hint: '🔥 地狱：每题仅 5 秒！' }
    };

    // ── 状态变量 ──────────────────────────────────────────────────
    let selectedDiff  = 'easy';
    let wordQueue     = [];
    let currentIndex  = 0;
    let correctWords  = [];
    let wrongWords    = [];
    let timerInterval = null;
    let timeLeft      = 20;
    const CIRCUMFERENCE = 276.46; // 2π × 44

    // ── 页面初始化 ────────────────────────────────────────────────
    window.onload = async () => {
        if (!currentUser) { location.href = 'login.html'; return; }
        document.getElementById('userNameDisplay').innerText = currentUser;
        document.getElementById('userAvatar').innerText = currentUser.charAt(0).toUpperCase();

        try {
            const res  = await authFetch(`/api/auth/user/info?username=${currentUser}`);
            const user = await res.json();
            if (user.vip) {
                document.getElementById('vipLabel').innerText = '💎 VIP 会员';
                showScreen('intro');
            } else {
                showScreen('vip');
            }
        } catch (e) {
            showScreen('vip');
        }
    };

    // ── 界面切换 ──────────────────────────────────────────────────
    function showScreen(name) {
        ['intro', 'countdown', 'dictating', 'result', 'vip'].forEach(s => {
            const el = document.getElementById(`screen-${s}`);
            if (el) el.classList.toggle('hidden', s !== name);
        });
    }

    // ── 难度选择 ──────────────────────────────────────────────────
    function selectDifficulty(level, btn) {
        selectedDiff = level;

        // 重置所有按钮样式
        ['easy', 'hard', 'hell'].forEach(d => {
            const b = document.getElementById(`diff-${d}`);
            if (b) {
                b.className = 'diff-btn py-4 px-2 sketch-border bg-white font-bold transition-all';
            }
        });

        // 高亮选中按钮
        if (btn) {
            btn.className = 'diff-btn py-4 px-2 sketch-border bg-primary text-white font-bold transition-all';
        }

        // 更新提示文字
        document.getElementById('diffHint').innerText = DIFFICULTY[level].hint;
    }

    // ── 开始听写 ──────────────────────────────────────────────────
    async function startDictation() {
        const count = parseInt(document.getElementById('wordCountSlider').value);

        try {
            const res  = await authFetch(`/api/books/words?username=${currentUser}&limit=${count}`);
            wordQueue  = await res.json();
        } catch (e) {
            alert('获取单词失败，请重试');
            return;
        }

        if (!wordQueue || wordQueue.length === 0) {
            alert('没有可用的单词，请先学习一些单词！');
            return;
        }

        // 打乱顺序
        wordQueue = wordQueue.sort(() => Math.random() - 0.5);

        // 重置状态
        currentIndex = 0;
        correctWords = [];
        wrongWords   = [];

        showScreen('countdown');
        runCountdown(3, () => {
            showScreen('dictating');
            document.getElementById('dictDiffLabel').innerText = DIFFICULTY[selectedDiff].label;
            loadWord();
        });
    }

    // ── 3-2-1 倒计时 ─────────────────────────────────────────────
    function runCountdown(n, callback) {
        const el = document.getElementById('countdownNum');
        el.innerText = n;
        el.classList.remove('pop-in');
        void el.offsetWidth; // reflow 触发动画重放
        el.classList.add('pop-in');

        if (n <= 0) {
            callback();
            return;
        }

        // 播放提示音（可选，浏览器允许时）
        playBeep(n === 1 ? 880 : 440, 0.15);

        setTimeout(() => runCountdown(n - 1, callback), 800);
    }

    // ── 加载当前单词 ──────────────────────────────────────────────
    function loadWord() {
        if (currentIndex >= wordQueue.length) {
            showResult();
            return;
        }

        const total = wordQueue.length;
        document.getElementById('dictProgress').innerText = `${currentIndex + 1} / ${total}`;

        const input = document.getElementById('dictInput');
        input.value = '';
        input.focus();

        // 隐藏上次反馈
        const fb = document.getElementById('lastFeedback');
        fb.style.opacity = '0';

        // 重置输入框颜色
        document.getElementById('dictInputBox').style.background = '';

        // 朗读单词
        speakWord(wordQueue[currentIndex].word);

        // 启动计时器
        startTimer();
    }

    // ── 计时器 ────────────────────────────────────────────────────
    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = DIFFICULTY[selectedDiff].seconds;

        updateTimerDisplay(timeLeft);

        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay(timeLeft);

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleTimeout();
            }
        }, 1000);
    }

    function updateTimerDisplay(t) {
        const total   = DIFFICULTY[selectedDiff].seconds;
        const ratio   = t / total;
        const offset  = CIRCUMFERENCE * (1 - ratio);
        const ring    = document.getElementById('timerRing');
        const numEl   = document.getElementById('timerNum');

        ring.style.strokeDashoffset = offset;
        numEl.innerText = t;

        // 颜色变化：绿 → 橙 → 红
        if (ratio > 0.5)       ring.style.stroke = '#568203';
        else if (ratio > 0.25) ring.style.stroke = '#f97316';
        else                   ring.style.stroke = '#ef4444';
    }

    // ── 超时处理 ──────────────────────────────────────────────────
    function handleTimeout() {
        const word = wordQueue[currentIndex].word;
        wrongWords.push(word);
        showFeedback(false, `⏰ 超时！正确答案：${word}`);
        flashInputBox(false);
        currentIndex++;
        setTimeout(() => loadWord(), 1200);
    }

    // ── 跳过 ─────────────────────────────────────────────────────
    function skipWord() {
        clearInterval(timerInterval);
        const word = wordQueue[currentIndex].word;
        wrongWords.push(word);
        showFeedback(false, `跳过：${word}`);
        flashInputBox(false);
        currentIndex++;
        setTimeout(() => loadWord(), 800);
    }

    // ── Enter 提交答案 ────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('dictInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitAnswer();
        });
    });

    // 兼容：直接绑定（DOMContentLoaded 可能已过）
    window.addEventListener('load', () => {
        const input = document.getElementById('dictInput');
        if (input) {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') submitAnswer();
            });
        }
    });

    function submitAnswer() {
        clearInterval(timerInterval);
        const input   = document.getElementById('dictInput');
        const typed   = input.value.trim().toLowerCase();
        const correct = wordQueue[currentIndex].word.trim().toLowerCase();

        if (!typed) return; // 空输入不处理

        if (typed === correct) {
            correctWords.push(wordQueue[currentIndex].word);
            showFeedback(true, '✓ 正确！');
            flashInputBox(true);
            playBeep(880, 0.1);
        } else {
            wrongWords.push(wordQueue[currentIndex].word);
            showFeedback(false, `✗ 错误，正确：${wordQueue[currentIndex].word}`);
            flashInputBox(false);
            playBeep(220, 0.15);
        }

        currentIndex++;
        setTimeout(() => loadWord(), 900);
    }

    // ── 反馈动画 ──────────────────────────────────────────────────
    function showFeedback(isCorrect, msg) {
        const el = document.getElementById('lastFeedback');
        el.innerText = msg;
        el.style.color = isCorrect ? '#568203' : '#F4520D';
        el.style.opacity = '1';
    }

    function flashInputBox(isCorrect) {
        const box = document.getElementById('dictInputBox');
        box.classList.remove('flash-correct', 'flash-wrong');
        void box.offsetWidth;
        box.classList.add(isCorrect ? 'flash-correct' : 'flash-wrong');
    }

    // ── 朗读单词 ──────────────────────────────────────────────────
    function speakWord(word) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(word);
        utter.lang  = 'en-US';
        utter.rate  = 0.85;
        window.speechSynthesis.speak(utter);
    }

    // ── 提示音 ────────────────────────────────────────────────────
    function playBeep(freq, duration) {
        try {
            const ctx  = new (window.AudioContext || window.webkitAudioContext)();
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        } catch (e) { /* 浏览器未授权音频时静默失败 */ }
    }

    // ── 显示结果 ──────────────────────────────────────────────────
    function showResult() {
        clearInterval(timerInterval);

        const total    = wordQueue.length;
        const correct  = correctWords.length;
        const wrong    = wrongWords.length;
        const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

        document.getElementById('resultCorrect').innerText  = correct;
        document.getElementById('resultWrong').innerText    = wrong;
        document.getElementById('resultAccuracy').innerText = accuracy + '%';

        // emoji 根据正确率
        const emojis = accuracy >= 90 ? '🏆' : accuracy >= 70 ? '🎉' : accuracy >= 50 ? '💪' : '😅';
        document.getElementById('resultEmoji').innerText = emojis;

        // 错词列表
        if (wrongWords.length > 0) {
            const section = document.getElementById('wrongListSection');
            const list    = document.getElementById('wrongList');
            section.classList.remove('hidden');
            list.innerHTML = wrongWords.map(w =>
                `<span class="px-3 py-1 bg-red-50 text-error-red sketch-border text-sm font-bold">${w}</span>`
            ).join('');
        }

        showScreen('result');

        // 上报错词到后端（不阻塞）
        if (wrongWords.length > 0) {
            reportWrongWords(wrongWords);
        }
    }

    // ── 上报错词 ──────────────────────────────────────────────────
    async function reportWrongWords(words) {
        try {
            await authFetch('/api/review/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, words })
            });
        } catch (e) { /* 静默失败 */ }
    }

    // ── 再来一轮（保持设置重新抽词） ─────────────────────────────
    function restartDictation() {
        showScreen('intro');
    }

    // ── 退出登录 ──────────────────────────────────────────────────
    function logout() {
        clearInterval(timerInterval);
        localStorage.removeItem('jwt_token');
        sessionStorage.removeItem('loginUser');
        location.href = 'login.html';
    }
</script>
</body>
</html>
